<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Log in to project1 and continue writing reviews." />
		<title>project1 | Login</title>
		<link rel="stylesheet" href="../css/style.css" />
		<style>
			.auth-card {
				border-radius: 24px;
				border: 1px solid rgba(255, 255, 255, 0.14);
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
				padding: 18px;
			}

			.auth-form {
				display: grid;
				gap: 10px;
				margin-top: 14px;
			}

			.auth-form input {
				width: 100%;
				padding: 12px;
				border-radius: 12px;
				border: 1px solid var(--line);
				background: rgba(255, 255, 255, 0.06);
				color: var(--text);
				font: inherit;
			}

			.auth-help {
				font-size: 13px;
				color: var(--muted);
			}

			.auth-alert {
				display: none;
				margin-top: 12px;
				padding: 12px;
				border-radius: 12px;
				border: 1px solid var(--line);
				background: rgba(255, 255, 255, 0.05);
			}
		</style>
	</head>
	<body>
		<a class="skip-link" href="#content">Skip to content</a>
		<header>
			<div class="container">
				<div class="nav" aria-label="Primary navigation">
					<a class="brand" href="./index.html" aria-label="Project1 home">
						<div class="logo" aria-hidden="true"></div>
						<div>
							<strong>project1</strong>
							<span>Video game reviews</span>
						</div>
					</a>
					<nav class="nav-links" aria-label="Page links">
						<a href="./index.html">Home</a>
						<a href="./dashboard.html">Dashboard</a>
						<a href="./about.html">About</a>
						<a href="./registration.html">Sign up</a>
					</nav>
					<a class="btn btn-ghost" href="./registration.html">Create account</a>
				</div>
			</div>
		</header>

		<main id="content">
			<div class="container">
				<section class="auth-card">
					<div class="eyebrow">Login • Existing account</div>
					<h1>Log in to your account</h1>
					<p class="sub">If you already have an account, log in here first. New users can sign up in one click.</p>

					<form id="loginForm" class="auth-form">
						<input id="email" type="email" autocomplete="email" placeholder="you@example.com" required />
						<input id="password" type="password" autocomplete="current-password" placeholder="Your password" required />
						<button type="submit" class="btn btn-primary">Login</button>
					</form>
					<p class="auth-help">No account yet? <a href="./registration.html">Create a new account</a>.</p>
					<div id="authAlert" class="auth-alert" role="status" aria-live="polite"></div>
				</section>
			</div>
		</main>

		<footer>
			<div class="container">
				<div class="foot">
					<div>© <span id="year"></span> project1</div>
					<div>Login flow</div>
				</div>
			</div>
		</footer>

		<script>
			(function () {
				document.getElementById('year').textContent = String(new Date().getFullYear());
				const form = document.getElementById('loginForm');
				const alertBox = document.getElementById('authAlert');

				function show(message, isError) {
					alertBox.style.display = 'block';
					alertBox.style.borderColor = isError ? 'rgba(255, 84, 122, 0.45)' : 'rgba(21, 213, 124, 0.35)';
					alertBox.textContent = message;
				}

				form.addEventListener('submit', async (e) => {
					e.preventDefault();
					alertBox.style.display = 'none';
					const email = String(document.getElementById('email').value || '').trim();
					const password = String(document.getElementById('password').value || '');
					if (!email || !password) {
						show('Email and password are required.', true);
						return;
					}

					try {
						const res = await fetch('/api/auth/login', {
							method: 'POST',
							headers: { 'Content-Type': 'application/json' },
							body: JSON.stringify({ email, password }),
						});
						const data = await res.json().catch(() => ({}));
						if (!res.ok) {
							const err = String(data?.error || 'request_failed');
							if (err === 'invalid_credentials') {
								show('Invalid email or password.', true);
								return;
							}
							show(err.replace(/_/g, ' '), true);
							return;
						}
						show('Logged in. Redirecting to dashboard...', false);
						setTimeout(() => {
							window.location.href = './dashboard.html';
						}, 600);
					} catch {
						show('Unable to log in right now.', true);
					}
				});
			})();
		</script>
	</body>
</html>
