
<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Create an account or sign in to write reviews." />
		<title>project1 | Sign in</title>

		<style>
			:root {
				--bg: #070a16;
				--bg2: #0b1030;
				--card: rgba(255, 255, 255, 0.06);
				--card2: rgba(255, 255, 255, 0.085);
				--text: rgba(255, 255, 255, 0.92);
				--muted: rgba(255, 255, 255, 0.70);
				--line: rgba(255, 255, 255, 0.12);
				--accent: #7c5cff;
				--accent2: #00d6ff;
				--accent3: #15d57c;
				--radius: 18px;
				--focus: 0 0 0 4px rgba(124, 92, 255, 0.38);
				--max: 860px;
			}

			* { box-sizing: border-box; }
			html, body { height: 100%; }

			body {
				margin: 0;
				font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
				color: var(--text);
				background:
					radial-gradient(1100px 700px at 12% 10%, rgba(124, 92, 255, 0.30), transparent 60%),
					radial-gradient(900px 600px at 90% 15%, rgba(0, 214, 255, 0.20), transparent 60%),
					radial-gradient(900px 650px at 70% 95%, rgba(21, 213, 124, 0.14), transparent 65%),
					linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
				line-height: 1.5;
			}

			a { color: inherit; text-decoration: none; }
			.container { width: min(var(--max), calc(100% - 40px)); margin: 0 auto; }

			header {
				position: sticky;
				top: 0;
				z-index: 50;
				backdrop-filter: blur(10px);
				background: rgba(7, 10, 22, 0.55);
				border-bottom: 1px solid rgba(255, 255, 255, 0.10);
			}

			.nav {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 14px 0;
				gap: 12px;
			}

			.brand {
				display: inline-flex;
				align-items: center;
				gap: 10px;
			}

			.logo {
				width: 36px;
				height: 36px;
				border-radius: 14px;
				background:
					radial-gradient(16px 16px at 25% 25%, rgba(255,255,255,0.30), transparent 70%),
					linear-gradient(135deg, var(--accent) 0%, var(--accent2) 55%, var(--accent3) 100%);
				border: 1px solid rgba(255, 255, 255, 0.20);
				box-shadow: 0 12px 28px rgba(124, 92, 255, 0.20);
			}

			.btn {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				padding: 11px 14px;
				border-radius: 14px;
				font-weight: 700;
				border: 1px solid rgba(255, 255, 255, 0.16);
				background: rgba(255, 255, 255, 0.06);
				color: var(--text);
				cursor: pointer;
			}
			.btn:hover { background: rgba(255, 255, 255, 0.10); }
			.btn:focus { outline: none; box-shadow: var(--focus); }

			.btn-primary {
				color: #071026;
				border-color: rgba(124, 92, 255, 0.55);
				background: linear-gradient(135deg, rgba(124, 92, 255, 0.95) 0%, rgba(0, 214, 255, 0.78) 55%, rgba(21, 213, 124, 0.72) 100%);
			}

			main { padding: 34px 0 40px; }

			.panel {
				border-radius: 24px;
				border: 1px solid rgba(255, 255, 255, 0.14);
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
				box-shadow: 0 18px 52px rgba(0, 0, 0, 0.32);
				padding: 18px;
				position: relative;
				overflow: hidden;
			}

			.panel::before {
				content: "";
				position: absolute;
				inset: -2px;
				background:
					radial-gradient(520px 280px at 22% 22%, rgba(124, 92, 255, 0.33), transparent 62%),
					radial-gradient(420px 280px at 82% 35%, rgba(0, 214, 255, 0.22), transparent 62%),
					radial-gradient(380px 260px at 55% 92%, rgba(21, 213, 124, 0.14), transparent 62%);
				opacity: 0.95;
				pointer-events: none;
			}

			.panel-inner { position: relative; }

			h1 { margin: 0; font-size: 26px; letter-spacing: -0.4px; }
			p { margin: 10px 0 0; color: var(--muted); }

			.grid {
				margin-top: 14px;
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 12px;
			}

			.card {
				border-radius: var(--radius);
				border: 1px solid rgba(255, 255, 255, 0.14);
				background: rgba(7, 10, 22, 0.35);
				padding: 14px;
			}

			.card h2 { margin: 0; font-size: 16px; letter-spacing: -0.2px; }

			form { margin-top: 10px; display: grid; gap: 10px; }
			label { font-size: 12.5px; color: var(--muted); display: block; margin-bottom: 6px; }

			input {
				width: 100%;
				padding: 12px 12px;
				border-radius: 14px;
				border: 1px solid rgba(255, 255, 255, 0.14);
				background: rgba(255, 255, 255, 0.06);
				color: var(--text);
				font: inherit;
				outline: none;
			}
			input:focus { box-shadow: var(--focus); border-color: rgba(124, 92, 255, 0.65); }

			.hint { font-size: 12.5px; color: rgba(255,255,255,0.58); margin-top: 6px; }

			.alert {
				display: none;
				margin-top: 12px;
				padding: 12px 12px;
				border-radius: 14px;
				border: 1px solid rgba(255, 255, 255, 0.16);
				background: rgba(255, 255, 255, 0.06);
				color: var(--text);
			}
			.alert.error { border-color: rgba(255, 84, 122, 0.45); }
			.alert.success { border-color: rgba(21, 213, 124, 0.35); }

			footer {
				padding: 18px 0 34px;
				color: var(--muted);
				font-size: 12.5px;
			}

			@media (max-width: 820px) {
				.grid { grid-template-columns: 1fr; }
			}
		</style>
	</head>

	<body>
		<header>
			<div class="container">
				<div class="nav">
					<a class="brand" href="./index.html" aria-label="Back to home">
						<div class="logo" aria-hidden="true"></div>
						<div>
							<div style="font-weight:800; font-size:14px;">project1</div>
							<div style="font-size:12px; color: var(--muted);">Video game reviews</div>
						</div>
					</a>
					<a class="btn" href="./index.html">Home</a>
				</div>
			</div>
		</header>

		<main>
			<div class="container">
				<section class="panel" aria-label="Sign in">
					<div class="panel-inner">
						<h1>Sign in to write reviews</h1>
						<p>Create an account or log in. After login, you’ll be redirected back to the home page.</p>

						<div class="grid">
							<div class="card" aria-label="Register">
								<h2>Create account</h2>
								<form id="registerForm">
									<div>
										<label for="regEmail">Email</label>
										<input id="regEmail" type="email" autocomplete="email" required placeholder="you@example.com" />
									</div>
									<div>
										<label for="regPassword">Password</label>
										<input id="regPassword" type="password" autocomplete="new-password" required placeholder="At least 10 characters" />
										<div class="hint">Tip: use a passphrase (longer is better).</div>
									</div>
									<button class="btn btn-primary" type="submit">Register</button>
								</form>
							</div>

							<div class="card" aria-label="Login">
								<h2>Log in</h2>
								<form id="loginForm">
									<div>
										<label for="loginEmail">Email</label>
										<input id="loginEmail" type="email" autocomplete="email" required placeholder="you@example.com" />
									</div>
									<div>
										<label for="loginPassword">Password</label>
										<input id="loginPassword" type="password" autocomplete="current-password" required placeholder="Your password" />
									</div>
									<button class="btn btn-primary" type="submit">Log in</button>
								</form>
							</div>
						</div>

						<div id="alert" class="alert" role="status" aria-live="polite"></div>
					</div>
				</section>
			</div>
		</main>

		<footer>
			<div class="container">Backend must be running for login to work.</div>
		</footer>

		<script>
			(function () {
				const alertBox = document.getElementById('alert');
				const registerForm = document.getElementById('registerForm');
				const loginForm = document.getElementById('loginForm');

				function show(kind, text) {
					alertBox.className = 'alert ' + kind;
					alertBox.textContent = text;
					alertBox.style.display = 'block';
				}

				async function postJson(url, body) {
					const res = await fetch(url, {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify(body),
					});
					const data = await res.json().catch(() => ({}));
					if (!res.ok) {
						const msg = data?.error ? String(data.error) : 'request_failed';
						throw new Error(msg);
					}
					return data;
				}

				registerForm.addEventListener('submit', async (e) => {
					e.preventDefault();
					alertBox.style.display = 'none';

					const email = document.getElementById('regEmail').value.trim();
					const password = document.getElementById('regPassword').value;

					try {
						await postJson('/api/auth/register', { email, password });
						show('success', 'Account created. Now log in on the right.');
					} catch (err) {
						if (String(err.message) === 'email_already_exists') {
							show('error', 'That email is already registered. Try logging in.');
						} else {
							show('error', String(err.message));
						}
					}
				});

				loginForm.addEventListener('submit', async (e) => {
					e.preventDefault();
					alertBox.style.display = 'none';

					const email = document.getElementById('loginEmail').value.trim();
					const password = document.getElementById('loginPassword').value;

					try {
						await postJson('/api/auth/login', { email, password });
						show('success', 'Logged in. Redirecting…');
						setTimeout(() => {
							window.location.href = './index.html';
						}, 650);
					} catch (err) {
						if (String(err.message) === 'invalid_credentials') {
							show('error', 'Invalid email or password.');
						} else {
							show('error', String(err.message));
						}
					}
				});
			})();
		</script>
	</body>
</html>
